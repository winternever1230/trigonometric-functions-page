<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Unity 三角函数可视化学习</title>
<style>
body{font-family:Arial,"Microsoft YaHei",sans-serif;text-align:center;background:#f5f5f5;margin:0;padding:20px}
.container{display:flex;justify-content:center;gap:30px;flex-wrap:wrap}
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 10px #ccc}
canvas{background:#fff;border:1px solid #ddd}
input{width:300px}
pre{text-align:left;background:#222;color:#eee;padding:15px;border-radius:8px}
.value{font-size:18px;line-height:1.8}
button{padding:8px 15px;margin:5px}
</style>
</head>
<body>

<h1>Unity 三角函数学习：sin / cos 与坐标</h1>

<div class="container">
<div class="card">
<h2>单位圆</h2>
<canvas id="circle" width="400" height="400"></canvas>
<br>
角度：
<input id="angle" type="range" min="0" max="360" value="45">
<span id="angleText">45°</span>
<br>
半径：
<input id="radius" type="range" min="1" max="150" value="100">
<button onclick="toggle()">播放/暂停</button>
</div>

<div class="card">
<h2>实时数据</h2>
<div class="value" id="data"></div>
<h2>Unity代码</h2>
<pre id="code"></pre>
</div>
</div>

<div class="card">
<h2>sin / cos 曲线</h2>
<canvas id="wave" width="700" height="250"></canvas>
</div>

<script>
const circle=document.getElementById("circle");
const ctx=circle.getContext("2d");
const wave=document.getElementById("wave");
const wctx=wave.getContext("2d");

let angle=45;
let radius=100;
let playing=false;

function draw(){
    ctx.clearRect(0,0,400,400);

    let cx=200,cy=200;

    ctx.beginPath();
    ctx.arc(cx,cy,150,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(20,cy);
    ctx.lineTo(380,cy);
    ctx.moveTo(cx,20);
    ctx.lineTo(cx,380);
    ctx.stroke();

    let rad=angle*Math.PI/180;
    let x=Math.cos(rad);
    let y=Math.sin(rad);

    let px=cx+x*radius;
    let py=cy-y*radius;

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(px,py);
    ctx.strokeStyle="red";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(px,py,8,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();

    document.getElementById("angleText").innerText=angle.toFixed(1)+"°";

    document.getElementById("data").innerHTML=
    `
    弧度：${rad.toFixed(3)}<br>
    cos(${angle.toFixed(1)}°) = ${x.toFixed(4)}<br>
    sin(${angle.toFixed(1)}°) = ${y.toFixed(4)}<br><br>
    Unity坐标方向：<br>
    (${x.toFixed(4)}, ${y.toFixed(4)})
    `;

    document.getElementById("code").innerText=
`float rad = ${angle.toFixed(1)}f * Mathf.Deg2Rad;

Vector2 dir = new Vector2(
    Mathf.Cos(rad),
    Mathf.Sin(rad)
);

transform.position =
    center + dir * radius;`;

    drawWave();
}

function drawWave(){
    wctx.clearRect(0,0,700,250);

    wctx.beginPath();
    for(let i=0;i<700;i++){
        let a=i/700*Math.PI*2;
        let y=125-Math.sin(a)*80;
        if(i==0)wctx.moveTo(i,y);
        else wctx.lineTo(i,y);
    }
    wctx.stroke();

    wctx.beginPath();
    for(let i=0;i<700;i++){
        let a=i/700*Math.PI*2;
        let y=125-Math.cos(a)*80;
        if(i==0)wctx.moveTo(i,y);
        else wctx.lineTo(i,y);
    }
    wctx.stroke();
}

document.getElementById("angle").oninput=e=>{
    angle=parseFloat(e.target.value);
    draw();
};

document.getElementById("radius").oninput=e=>{
    radius=parseFloat(e.target.value);
    draw();
};

function toggle(){
    playing=!playing;
}

setInterval(()=>{
    if(playing){
        angle+=1;
        if(angle>360)angle=0;
        document.getElementById("angle").value=angle;
        draw();
    }
},30);

draw();
</script>

</body>
</html>
